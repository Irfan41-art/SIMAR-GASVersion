<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients/shadows -->
  <defs>
    <!-- Background Gradient: Deep Royal Blue to Slate -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Primary Gold/Yellow Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Secondary Cyan/Teal Neon Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Book Page Gradient -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Drop Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Solid App Corner Radius Background -->
  <rect width="512" height="512" rx="104" fill="url(#bgGrad)" />

  <!-- Outer Glow Ring -->
  <rect x="16" y="16" width="480" height="480" rx="88" fill="none" stroke="url(#cyanGrad)" stroke-width="4" stroke-opacity="0.3" />

  <!-- Main Gilded Education Emblem Shield with Shadow -->
  <g filter="url(#dropShadow)" transform="translate(0, -10)">
    <!-- Base Shield -->
    <path d="M 256,90 
             C 340,90 390,120 410,180 
             C 410,310 320,380 256,415 
             C 192,380 102,310 102,180 
             C 122,120 172,90 256,90 Z" 
          fill="#1e293b" 
          stroke="url(#goldGrad)" 
          stroke-width="12" 
          stroke-linejoin="round" />

    <!-- inner shield cyan accent ring -->
    <path d="M 256,110 
             C 324,110 368,136 386,182 
             C 386,290 308,354 256,386 
             C 204,354 126,290 126,182 
             C 144,136 188,110 256,110 Z" 
          fill="none" 
          stroke="url(#cyanGrad)" 
          stroke-width="3" 
          stroke-dasharray="8,6" />

    <!-- Stylized Modern Open Book -->
    <g transform="translate(141, 190)">
      <!-- Left Page Shadow/Underlayer -->
      <path d="M 115,10 C 115,10 70,5 0,25 L 0,105 C 70,85 115,90 115,90 Z" fill="#0284c7" opacity="0.3" />
      <!-- Right Page Shadow/Underlayer -->
      <path d="M 115,10 C 115,10 160,5 230,25 L 230,105 C 160,85 115,90 115,90 Z" fill="#0284c7" opacity="0.3" />

      <!-- Left Page Main -->
      <path d="M 115,5 C 115,5 70,0 0,20 L 0,100 C 70,80 115,85 115,85 Z" fill="url(#pageGrad)" />
      <!-- Right Page Main -->
      <path d="M 115,5 C 115,5 160,0 230,20 L 230,100 C 160,80 115,85 115,85 Z" fill="url(#pageGrad)" />

      <!-- Left Page Text Lines -->
      <line x1="20" y1="35" x2="95" y2="25" stroke="#475569" stroke-width="4" stroke-linecap="round" />
      <line x1="20" y1="52" x2="95" y2="42" stroke="#475569" stroke-width="4" stroke-linecap="round" />
      <line x1="20" y1="69" x2="80" y2="61" stroke="#475569" stroke-width="4" stroke-linecap="round" />

      <!-- Right Page Text Lines -->
      <line x1="135" y1="25" x2="210" y2="35" stroke="#475569" stroke-width="4" stroke-linecap="round" />
      <line x1="135" y1="42" x2="210" y2="52" stroke="#475569" stroke-width="4" stroke-linecap="round" />
      <line x1="135" y1="61" x2="195" y2="69" stroke="#475569" stroke-width="4" stroke-linecap="round" />

      <!-- Book Spine/Center Divide -->
      <path d="M 115,0 L 115,87" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
    </g>

    <!-- Glowing Feather Quill Pen or Rising Star of Administration above Book -->
    <path d="M 235,175 C 235,175 240,140 256,125 C 272,140 277,175 277,175 Z" fill="url(#goldGrad)" />
    <!-- Golden administration star -->
    <polygon points="256,128 261,139 272,140 264,147 266,158 256,152 246,158 248,147 240,140 251,139" fill="#0284c7" />

    <!-- Educational Laurel Wreath inside shield (Left/Right leaves) -->
    <!-- Left Leaves -->
    <g fill="url(#goldGrad)">
      <circle cx="150" cy="150" r="8" />
      <circle cx="135" cy="180" r="8" />
      <circle cx="128" cy="215" r="8" />
      <circle cx="130" cy="250" r="8" />
      <circle cx="140" cy="285" r="8" />
      <circle cx="158" cy="318" r="8" />
    </g>
    <!-- Right Leaves -->
    <g fill="url(#goldGrad)">
      <circle cx="362" cy="150" r="8" />
      <circle cx="377" cy="180" r="8" />
      <circle cx="384" cy="215" r="8" />
      <circle cx="382" cy="250" r="8" />
      <circle cx="372" cy="285" r="8" />
      <circle cx="354" cy="318" r="8" />
    </g>
  </g>

  <!-- Sleek Banner Text "SIMAR" at the bottom -->
  <g transform="translate(0, 395)">
    <!-- Elegant Ribbon Background -->
    <path d="M 110,10 L 402,10 L 372,50 L 140,50 Z" fill="#0f172a" stroke="url(#goldGrad)" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Bold Gold Text with shadow -->
    <text x="256" y="38" 
          font-family="'Outfit', 'Inter', sans-serif" 
          font-size="28" 
          font-weight="900" 
          letter-spacing="6" 
          fill="url(#goldGrad)" 
          text-anchor="middle">SIMAR</text>
  </g>

  <!-- Miniature "SDN 4 PUSUNGI" Text below banner -->
  <text x="256" y="480" 
        font-family="'Inter', sans-serif" 
        font-size="13" 
        font-weight="800" 
        letter-spacing="3" 
        fill="#94a3b8" 
        text-anchor="middle">SDN 4 PUSUNGI</text>
</svg>
